name: Sync Fork
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.VANASSISTANT_TOKEN }}

      - uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: gilbertchen/acrosync-library
          upstream_sync_branch: master
          target_sync_branch: master
          target_repo_token: ${{ secrets.VANASSISTANT_TOKEN }}
